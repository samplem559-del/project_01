name: CI/CD Pipeline - React App to Firebase

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug directory structure
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Directory contents:"
          ls -la
          echo ""
          echo "Looking for cicd-dashboard:"
          if [ -d "cicd-dashboard" ]; then
            echo "✅ cicd-dashboard found at root"
            ls -la cicd-dashboard/
          else
            echo "❌ cicd-dashboard not found at root"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
        working-directory: cicd-dashboard

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: cicd-dashboard

      - name: Build project
        run: npm run build
        working-directory: cicd-dashboard

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
        working-directory: cicd-dashboard

      - name: Build project
        run: npm run build
        working-directory: cicd-dashboard

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: your-firebase-project-id
